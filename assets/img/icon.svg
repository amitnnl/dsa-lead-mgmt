<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium Sleek Dark Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a13" />
      <stop offset="100%" stop-color="#0f1626" />
    </linearGradient>
    
    <!-- Glowing Bosch Green Gradient for the Bolt -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" />
      <stop offset="50%" stop-color="#226e54" />
      <stop offset="100%" stop-color="#14532d" />
    </linearGradient>
    
    <!-- Neon Drop Shadow Filter for Lighting Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Rounded Background Card -->
  <rect x="24" y="24" width="464" height="464" rx="108" fill="url(#bgGrad)" stroke="rgba(34, 110, 84, 0.25)" stroke-width="8" />
  
  <!-- Subtle Inner Glassmorphic Border for Depth -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="4" />
  
  <!-- Modern Geometric Lightning Bolt Icon with Glow -->
  <path d="M295 65 L145 275 L255 275 L227 457 L377 247 L267 247 Z" fill="url(#boltGrad)" filter="url(#glow)" />
</svg>
